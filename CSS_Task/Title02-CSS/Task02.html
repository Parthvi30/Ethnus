<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Task 02</title>
     <style>
        body{
     display: flex;
     justify-content:center ;
     align-items: center;
     flex-direction: column;
}
.vertical-navigation-bar {
     width: 200px;
     display: flex;
     flex-direction: column;
}

.vertical-navigation-bar a {
     padding: 15px;
     text-align: center;
     text-decoration: none;
     color: white;
     display: block;
}

.vertical-navigation-bar a.home {
     background-color: orange;
}

.vertical-navigation-bar a.java,
.vertical-navigation-bar a.css,
.vertical-navigation-bar a.html,
.vertical-navigation-bar a.bootstrap {
     background-color: lightblue;
}

.vertical-navigation-bar a:hover {
     opacity: 0.8;
}

.horizontal-navigation-bar {
     display: flex;
     justify-content: space-around;
     background-color: #f1f1f1;
     padding: 10px;
}

.horizontal-navigation-bar a {
     padding: 10px 20px;
     text-align: center;
     text-decoration: none;
     color: black;
     display: inline-block;
}

.horizontal-navigation-bar a.home {
     background-color: grey;
}

.horizontal-navigation-bar a.java,
.horizontal-navigation-bar a.css,
.horizontal-navigation-bar a.html,
.horizontal-navigation-bar a.bootstrap {
     background-color: lightgrey;
}

.horizontal-navigation-bar a:hover {
     opacity: 0.8;
}
     </style>
</head>
<body>
     <div class="vertical-navigation-bar">
          <a href="#" class="home">Home</a>
          <a href="#" class="java">Java</a>
          <a href="#" class="css">CSS</a>
          <a href="#" class="html">HTML</a>
          <a href="#" class="bootstrap">Bootstrap</a>
     </div>

     <br><br><br><br><br>
     <div class="horizontal-navigation-bar">
          <a href="#" class="home">Home</a>
          <a href="#" class="java">Java</a>
          <a href="#" class="css">CSS</a>
          <a href="#" class="html">HTML</a>
          <a href="#" class="bootstrap">Bootstrap</a>
     </div>
</body>
</html>
